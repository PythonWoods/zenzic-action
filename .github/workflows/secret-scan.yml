name: Secret Scan
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  secret-scan:
    name: Native GitHub Secret Scan Proxy
    runs-on: ubuntu-latest
    steps:
      - name: Info
        run: |
          echo "Using GitHub Native Secret Scanning (Settings > Code security)."
          echo "Gitleaks disabled due to license requirements for private repos."
