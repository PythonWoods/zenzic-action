name: Zenzic Self-Check

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write  # required for upload-sarif

jobs:
  # Composite action runs bash — validate across all three runner OSes
  # (Windows uses Git Bash; macOS uses zsh-compatible bash shim).
  zenzic:
    name: Quality Gate / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Run Zenzic
        uses: ./
        with:
          version: "0.7.0"
          format: sarif
          upload-sarif: "true"
          fail-on-error: "true"
