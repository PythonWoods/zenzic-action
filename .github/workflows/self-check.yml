name: Zenzic Self-Check

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write  # required for upload-sarif

jobs:
  verify:
    name: Verify — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
      fail-fast: false
    defaults:
      run:
        shell: bash
    env:
      # ZENZIC_EXTRA_ARGS: runtime 404 shield — propagated to just check via wrapper
      ZENZIC_EXTRA_ARGS: >-
        --exclude-url https://zenzic.dev/blog/
        --exclude-url https://zenzic.dev/docs/
        --exclude-url https://github.com/PythonWoods/zenzic/releases/tag/v0.7.0
    steps:
      - uses: actions/checkout@v6

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Run unified verification
        run: just verify
