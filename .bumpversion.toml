[tool.bumpversion]
current_version = "2.3.1"
parse = "(?P<major>\\d+)\\.(?P<minor>\\d+)\\.(?P<patch>\\d+)"
serialize = ["{major}.{minor}.{patch}"]

[[tool.bumpversion.files]]
filename = "package.json"
search = '"version": "{current_version}"'
replace = '"version": "{new_version}"'

[[tool.bumpversion.files]]
filename = "RELEASE.md"
search = '(?m)^(\| Version\s+\|\s+)v{current_version}(\s*\|)$'
replace = '| Version | v{new_version} |'
regex = true

[[tool.bumpversion.files]]
filename = "RELEASE.md"
search = '(?m)^(\| Date\s+\|\s+)\d{{4}}-\d{{2}}-\d{{2}}(\s*\|)$'
replace = '| Date    | {now:%Y-%m-%d} |'
regex = true

[[tool.bumpversion.files]]
filename = "RELEASE.md"
search = "- [ ] `package.json` version bumped to `{current_version}`"
replace = "- [ ] `package.json` version bumped to `{new_version}`"

[[tool.bumpversion.files]]
filename = "RELEASE.md"
search = "- [ ] `CHANGELOG.md` — `[Unreleased]` section promoted to `[{current_version}]`"
replace = "- [ ] `CHANGELOG.md` — `[Unreleased]` section promoted to `[{new_version}]`"

[[tool.bumpversion.files]]
filename = "RELEASE.md"
search = "- [ ] Update SECURITY.md support table (add v{current_version},"
replace = "- [ ] Update SECURITY.md support table (add v{new_version},"

# ---------------------------------------------------------------------------
# Core pin — state tracking only.
# Actual updates are performed by `just pin-core <version>`.
# bump-my-version does NOT manage these files; they are listed here for discoverability.
# ---------------------------------------------------------------------------
[tool.bumpversion.custom_variables.core_version]
current = "0.16.0"
