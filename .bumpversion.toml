[tool.bumpversion]
current_version = "1.0.1"
parse = "(?P<major>\\d+)\\.(?P<minor>\\d+)\\.(?P<patch>\\d+)"
serialize = ["{major}.{minor}.{patch}"]

[[tool.bumpversion.files]]
filename = "CHANGELOG.md"
search = "## [{current_version}]"
replace = "## [{new_version}]"

[[tool.bumpversion.files]]
filename = "package.json"
search = '"version": "{current_version}"'
replace = '"version": "{new_version}"'

[[tool.bumpversion.files]]
filename = "RELEASE.md"
search = '(?m)^(\| Date\s+\|\s+)\d{{4}}-\d{{2}}-\d{{2}}(\s*\|)$'
replace = '| Date    | {now:%Y-%m-%d} |'
regex = true

# Core pin bump is coordinated separately (0.7.1 -> 0.8.0), but must be covered.
[[tool.bumpversion.files]]
filename = "action.yml"
search = 'default:\s*"0\.7\.1"'
replace = 'default: "0.8.0"'
regex = true

[[tool.bumpversion.files]]
filename = "noxfile.py"
search = 'zenzic@v0\.7\.1'
replace = 'zenzic@v0.8.0'
regex = true

[[tool.bumpversion.files]]
filename = "README.md"
search = 'version:\s*"0\.7\.1"'
replace = 'version: "0.8.0"'
regex = true

[[tool.bumpversion.files]]
filename = "README.it.md"
search = 'version:\s*"0\.7\.1"'
replace = 'version: "0.8.0"'
regex = true
