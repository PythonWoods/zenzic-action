repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending

  - repo: https://github.com/fsfe/reuse-tool
    rev: v6.2.0
    hooks:
      - id: reuse

  - repo: local
    hooks:
      - id: zenzic-check
        name: 🔍 Zenzic Sentinel (action audit)
        entry: just check
        language: system
        pass_filenames: false
        always_run: true

  # Pre-push Final Guard (4-Gates Standard, EPOCH 4 / v0.7.0)
  # Single entry-point: locale ≡ remote. Same `just verify` runs in GHA.
  # Install with: uvx pre-commit install -t pre-push
  - repo: local
    hooks:
      - id: just-verify
        name: 🛡️ Zenzic-Action Final Guard (just verify)
        entry: just verify
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
