# zenzic.toml — Standalone configuration for the zenzic-action repository.
#
# "Prose-only Maintenance" config: scans root-level Markdown files.
# The action has no docs/ tree — docs_dir = "." is the correct perimeter.
#
# 🏛️ LOCAL SOVEREIGNTY: keep machine-specific overrides and private
# secrets in `.zenzic.local.toml` only. Shared `zenzic.toml` remains CI policy.
#
# 🌿  ZERO-CONFIG NOTE:
#   * Universal build / cache dirs and toolchain files are excluded by
#     SYSTEM_EXCLUDED_DIRS / SYSTEM_EXCLUDED_FILE_NAMES — no repetition needed.

docs_dir = "."

# Repo-specific directories that are not documentation.
excluded_dirs = [
    "assets",
    "scripts",
    "LICENSES",
]

# ADR-039.1: .zenzic.local.toml.example and *.sh are excluded by Core system guards.

excluded_external_urls = [
    # GitHub repo URLs return 429 (rate-limited) in CI.
    "https://github.com/PythonWoods/zenzic-action",
    "https://github.com/PythonWoods/zenzic",
]

placeholder_patterns = []

[build_context]
engine = "standalone"

[[custom_rules]]
id       = "ZZ-NOCLICKHERE"
pattern  = "(?i)\\bclick here\\b|\\bclicca qui\\b"
message  = "Avoid generic link text. Use a meaningful description for accessibility."
severity = "error"

[project_metadata]
release_name = "Basalt"

[governance]
suppression_cap = 30
suppression_cap_fail_hard = true

# Per-file suppression map: silence a rule for specific file globs.
# WARNING: Every entry increases your Technical Debt Score (see formula above).
# Use 'zenzic check --audit' to see what would be flagged without suppressions.
# [governance.per_file_ignores]
# "docs/legacy/**" = ["Z601"]   # intentional brand refs → -1 pt

# Permanent vocabulary guardian: Z601 BRAND_OBSOLESCENCE fires if theatrical
# brand terms reappear in documentation source. CHANGELOG*.md excluded.
brand_obsolescence = [
    "Vanilla",
    "Sentinel",
    "Blood Sentinel",
    "Shield",
    "Epoch",
    "Forge",
    "Red Team",
    "Operation",
    "Quartz",
    "Obsidian",
    "ObsidianUI",
    "Safe Harbor",
    "Porto Sicuro",
    "Basalt",
    "Chronicles",
    "Siege",
]
