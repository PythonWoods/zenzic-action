<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 120" width="700" height="120">
  <defs>
    <clipPath id="br-clip-wma">
      <rect x="103" y="103" width="97" height="97" rx="10"/>
    </clipPath>
    <mask id="slash-cut-wma">
      <rect x="0" y="0" width="200" height="200" fill="white"/>
      <polygon points="162,-5 138,-5 38,205 62,205" fill="black"/>
    </mask>
  </defs>

  <!-- Icon 100x100, vertically centred in 120px canvas -->
  <g transform="translate(10, 10) scale(0.5)">
    <g mask="url(#slash-cut-wma)">
      <rect x="0" y="0" width="97" height="97" rx="10" fill="#38bdf8"/>
      <rect x="103" y="0" width="97" height="97" rx="10" fill="#4f46e5"/>
      <rect x="0" y="103" width="97" height="97" rx="10" fill="#4f46e5"/>
      <g clip-path="url(#br-clip-wma)">
        <polygon points="103,103 200,103 200,120 160,200 103,200" fill="#4f46e5"/>
      </g>
    </g>
  </g>

  <!-- "Zenzic" — dark for light backgrounds -->
  <text x="125" y="68" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="56" fill="#0f172a" letter-spacing="-1.5">Zenzic</text>

  <!-- "/" separator — muted -->
  <text x="308" y="67" font-family="system-ui, -apple-system, sans-serif" font-weight="300" font-size="52" fill="#94a3b8">/</text>

  <!-- "action" — indigo accent -->
  <text x="333" y="68" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="56" fill="#4f46e5" letter-spacing="-1.5">action</text>

  <!-- Tagline -->
  <text x="127" y="93" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="12" fill="#475569" letter-spacing="3">THE OFFICIAL GITHUB ACTION</text>
</svg>
